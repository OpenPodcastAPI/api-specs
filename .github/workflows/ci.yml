name: Continous Integration
on:
  push:
  workflow_dispatch:
jobs:
  check-links:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Lychee Broken Link Checker
      uses: lycheeverse/lychee-action@v2.8.0
      with:
	args: --root-dir "$(pwd)/src/content/docs" --verbose --no-progress './**/*.md' './**/*.mdx'
        fail: true
